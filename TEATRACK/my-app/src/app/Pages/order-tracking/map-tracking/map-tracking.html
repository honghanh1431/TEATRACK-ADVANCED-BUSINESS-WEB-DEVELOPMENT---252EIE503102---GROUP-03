<div class="map-tracking-wrap" *ngIf="order">
  <div class="map-wrap">
    <iframe
      *ngIf="selectedEmbed"
      class="map-iframe"
      [src]="selectedEmbed"
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
      title="Bản đồ chi nhánh giao hàng">
    </iframe>
    <div class="map-placeholder" *ngIf="!selectedEmbed && !errorMessage">Đang tải bản đồ...</div>
  </div>
  <p class="map-tracking-error" *ngIf="errorMessage">{{ errorMessage }}</p>
</div>
