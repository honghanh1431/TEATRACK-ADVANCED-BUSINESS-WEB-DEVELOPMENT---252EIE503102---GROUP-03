<section class="auth">
  <!-- BÊN TRÁI -->
  <aside class="side-left">
    <div class="inner">
      <div class="brand">
        <a routerLink="/" aria-label="Về trang chủ">
          <img src="/assets/images/logo ngo gia.png" alt="Ngô Gia Logo" />
        </a>
      </div>
      <p class="desc">{{ t['fp.left.desc'] }}</p>
    </div>
  </aside>

  <!-- BÊN PHẢI -->
  <main class="side-right">
    <div class="form-wrap">
      <!-- Nút chuyển ngôn ngữ -->
      <div class="lang-bar" role="group" aria-label="Language switcher">
        <button class="lang-btn" [class.active]="currentLang === 'vi'" (click)="setLang('vi')">VI</button>
        <button class="lang-btn" [class.active]="currentLang === 'en'" (click)="setLang('en')">EN</button>
      </div>

      <div class="welcome-header">
        <h2>{{ t['fp.title'] }}</h2>
        <p>{{ step === 1 ? t['fp.step1.subtitle'] : (step === 2 ? t['fp.step2.subtitle'] : t['fp.step3.subtitle']) }}</p>
      </div>

      <!-- Hiển thị thông báo lỗi/thành công -->
      <div *ngIf="errorMessage" class="error-message" [class.fade-out]="isHiding">{{ errorMessage }}</div>
      <div *ngIf="successMessage" class="success-message" [class.fade-out]="isHiding">{{ successMessage }}</div>
      <!-- Bước 1 -->
      <div *ngIf="step === 1">
        <div class="form-group">
          <label class="label">{{ t['fp.label.email'] }} <span class="req">*</span></label>
          <input type="email" class="input" [(ngModel)]="email" [placeholder]="t['fp.ph.email']"
            (keydown.enter)="onRequestOtp()">
        </div>
        <div class="form-group">
          <button class="btn btn-primary" (click)="onRequestOtp()" [disabled]="isLoading">
            <span *ngIf="!isLoading">{{ t['fp.btn.sendOtp'] }}</span>
            <span *ngIf="isLoading">{{ t['fp.btn.sending'] }}</span>
          </button>
        </div>
        <div class="link-muted" routerLink="/login">{{ t['fp.backToLogin'] }}</div>
      </div>

      <!-- Bước 2 -->
      <div *ngIf="step === 2">
        <div class="form-group">
          <label class="label">{{ t['fp.label.otp'] }} <span class="req">*</span></label>
          <input type="text" class="input" [(ngModel)]="otp" [placeholder]="t['fp.ph.otp']" maxlength="6"
            (keydown.enter)="onVerifyOtp()">
        </div>
        <div class="form-group">
          <button class="btn btn-primary" (click)="onVerifyOtp()" [disabled]="isLoading">
            <span *ngIf="!isLoading">{{ t['fp.btn.confirm'] }}</span>
            <span *ngIf="isLoading">{{ t['fp.btn.verifying'] }}</span>
          </button>
        </div>
        <div class="link-muted" (click)="goBack()" style="cursor:pointer;">{{ t['fp.back'] }}</div>
      </div>

      <!-- Bước 3 -->
      <div *ngIf="step === 3">

        <!-- New Password -->
        <div class="form-group">
          <label class="label">{{ t['fp.label.newPassword'] }} <span class="req">*</span></label>
          <div class="control">
            <input [type]="showNewPassword ? 'text' : 'password'" class="input"
              [placeholder]="t['fp.ph.newPassword']" autocomplete="new-password"
              [(ngModel)]="newPassword" (keydown.enter)="onResetPassword()">

            <button class="toggle-eye" type="button"
              (click)="showNewPassword = !showNewPassword" aria-label="Hiện/ẩn mật khẩu">

              <!-- Eye Off -->
              <svg *ngIf="!showNewPassword" width="22" height="22" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a20.29 20.29 0 0 1 5.08-6.23" />
                <path d="M1 1l22 22" />
                <path d="M9.88 9.88a3 3 0 0 0 4.24 4.24" />
                <path d="M10.73 5.08A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a20.29 20.29 0 0 1-4.18 5.17" />
              </svg>

              <!-- Eye On -->
              <svg *ngIf="showNewPassword" width="22" height="22" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label class="label">{{ t['fp.label.confirmPassword'] }} <span class="req">*</span></label>
          <div class="control">
            <input [type]="showConfirmPassword ? 'text' : 'password'" class="input"
              [placeholder]="t['fp.ph.confirmPassword']" autocomplete="new-password"
              [(ngModel)]="confirmPassword" (keydown.enter)="onResetPassword()">

            <button class="toggle-eye" type="button"
              (click)="showConfirmPassword = !showConfirmPassword"
              aria-label="Hiện/ẩn mật khẩu">

              <!-- Eye Off -->
              <svg *ngIf="!showConfirmPassword" width="22" height="22" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a20.29 20.29 0 0 1 5.08-6.23" />
                <path d="M1 1l22 22" />
                <path d="M9.88 9.88a3 3 0 0 0 4.24 4.24" />
                <path d="M10.73 5.08A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a20.29 20.29 0 0 1-4.18 5.17" />
              </svg>

              <!-- Eye On -->
              <svg *ngIf="showConfirmPassword" width="22" height="22" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <button class="btn btn-primary" (click)="onResetPassword()" [disabled]="isLoading">
            <span *ngIf="!isLoading">{{ t['fp.btn.reset'] }}</span>
            <span *ngIf="isLoading">{{ t['fp.btn.updating'] }}</span>
          </button>
        </div>

        <div class="link-muted" (click)="goBack()" style="cursor:pointer;">{{ t['fp.back'] }}</div>
      </div>
    </div>
    <!-- Modal thông báo thành công -->
    <div class="modal-overlay" *ngIf="showSuccessModal" (click)="closeModalAndNavigate()">
        <div class="modal-card" (click)="$event.stopPropagation()">
            <div class="modal-content">
            <p>{{ modalMessage }}</p>
            <button class="btn btn-primary modal-btn" (click)="closeModalAndNavigate()">{{ t['fp.modal.ok'] }}</button>
            </div>
        </div>
    </div>
  </main>
</section>
