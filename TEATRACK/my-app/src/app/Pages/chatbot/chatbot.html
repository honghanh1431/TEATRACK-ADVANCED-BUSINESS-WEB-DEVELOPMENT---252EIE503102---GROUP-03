<div class="chatbot-float" *ngIf="showChatbot">
  <!-- Nút mở chat (floating action button) - luôn hiển thị, không ẩn khi mở panel -->
  <button
    type="button"
    class="chat-toggle-btn"
    (click)="togglePanel()"
    aria-label="Mở chatbot"
  >
    <span class="chat-toggle-icon">💬</span>
  </button>

  <!-- Panel chat (hiện khi isOpen) -->
  <div class="chat-panel" [class.show]="isOpen">
    <div class="chat-wrapper">
      <div class="chat-header">
        <div class="header-info">
          <div class="avatar" aria-hidden="true">
            <img src="assets/icons/chatbot.png" alt="Chatbot" width="35" height="35" />
          </div>
          <div>
            <h3>Ngô Gia Chatbot</h3>
            <span class="status">{{ isTyping ? 'Đang trả lời...' : 'Online' }}</span>
          </div>
        </div>
        <div class="header-actions">
          <button
            type="button"
            class="clear-btn"
            (click)="clearChat()"
            title="Xóa lịch sử hội thoại"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
              width="20"
              height="20"
            >
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
              <path d="M10 11v6M14 11v6" />
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
            </svg>
          </button>
          <button type="button" class="close-btn" (click)="closePanel()" aria-label="Đóng">
            ×
          </button>
        </div>
      </div>

      <div class="chat-body" #chatContainer>
        <div
          *ngFor="let msg of messages"
          class="message-row"
          [class.user-row]="msg.role === 'user'"
          [class.bot-row]="msg.role === 'bot'"
        >
          <div *ngIf="msg.role === 'bot'" class="bot-avatar">
            <img src="assets/icons/chatbot.png" alt="Chatbot" width="20" height="20" />
          </div>
          <div
            class="bubble"
            [class.user-bubble]="msg.role === 'user'"
            [class.bot-bubble]="msg.role === 'bot'"
          >
            <div *ngIf="msg.loading" class="typing-dots">
              <span></span><span></span><span></span>
            </div>
            <div
              *ngIf="!msg.loading && msg.role === 'bot'"
              class="bubble-content bubble-content--bot"
              [innerHTML]="msg.text | chatbotMarkdown"
            ></div>
            <span *ngIf="!msg.loading && msg.role === 'user'" class="bubble-content">{{
              msg.text
            }}</span>
            <div class="timestamp">{{ msg.timestamp | date: 'HH:mm' }}</div>
          </div>
          <div *ngIf="msg.role === 'user'" class="user-avatar"></div>
        </div>
      </div>

      <div class="chat-footer">
        <textarea
          [(ngModel)]="userInput"
          (keydown)="onKeyDown($event)"
          placeholder="Say 'Hi' với Ngô Gia để nhận menu mới nhất nào!"
          rows="1"
          [disabled]="isTyping"
        ></textarea>
        <button
          type="button"
          class="send-btn"
          (click)="sendMessage()"
          [disabled]="isTyping || !userInput.trim()"
          [attr.aria-label]="isTyping ? 'Đang gửi' : 'Gửi tin nhắn'"
        >
          <ng-container *ngIf="!isTyping">
            <svg
              class="send-btn-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="
              transform: rotate(45deg);"
            >
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </ng-container>
          <span *ngIf="isTyping" class="send-btn-loading" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="12" />
            </svg>
          </span>
        </button>
      </div>
    </div>
  </div>
</div>
