<header class="shop-header logged">
  <div class="header-top">
    <div class="brand">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" aria-label="Về trang chủ">
        <img src="assets/images/logo ngo gia.png" alt="Hồng Trà Ngô Gia" class="logo" />
      </a>
    </div>

    <div class="actions">
      <a class="cart-link" routerLink="/cart/">
        <span class="icon-wrap">
          <img src="assets/icons/Cart.png" alt="Giỏ hàng">
          <span class="cart-badge" *ngIf="cartCount > 0" [attr.data-cart-count]="cartCount">{{ cartCount }}</span>
        </span>
        <div class="cart-meta">
          <span class="label">Giỏ hàng</span>
          <span id="headerCartCount" class="header-cart-count">{{ cartCount }}</span>
          <span id="headerCartTotal" class="header-cart-total">{{ cartTotalStr }}</span>
        </div>
      </a>

      <div class="user" id="user-box" #userBox [class.open]="userMenuOpen">
        <button class="user-btn" id="user-btn" type="button"
                aria-haspopup="menu" [attr.aria-expanded]="userMenuOpen" aria-controls="user-menu"
                (click)="toggleUserMenu($event)">
          <img class="avatar" id="user-avatar" src="assets/icons/user.png" alt="User">
          <span class="name" id="user-name" data-user-chip>{{ userName }}</span>
          <span class="caret" aria-hidden="true">▾</span>
        </button>
        <div class="menu" id="user-menu" role="menu">
          <a role="menuitem" routerLink="/profile" (click)="closeUserMenu()">Hồ sơ</a>
          <a role="menuitem" routerLink="/order-history" (click)="closeUserMenu()">Đơn hàng</a>
          <button role="menuitem" id="btn-logout" type="button" (click)="onLogout($event)">Đăng xuất</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="nav-bar">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
      class="nav-item"
    >
      <img src="assets/icons/Home.png" alt=""> Trang chủ
    </a>
    <a routerLink="/aboutus" routerLinkActive="active">
      <img src="assets/icons/info.png" alt="">Về chúng tôi
    </a> 
    <a routerLink="/menu" routerLinkActive="active" class="nav-item">
      <img src="assets/icons/menu.png" alt="">Menu thức uống
    </a>
    <a routerLink="/contact" routerLinkActive="active">
      <img src="assets/icons/lien_he.png" alt="">Liên hệ
    </a>
    <a routerLink="/blog" routerLinkActive="active">
      <img src="assets/icons/dien_dan.png" alt="">Diễn đàn
    </a>
    <a routerLink="/agency" routerLinkActive="active">
      <img src="assets/icons/chi_nhanh.png" alt="">Chi nhánh
    </a>
  </nav>
</header>

<div
  class="header-alert-modal"
  *ngIf="showLogoutModal"
  (click)="closeLogoutModal()"
  role="dialog"
  aria-modal="true"
  aria-labelledby="header-logout-title"
>
  <div class="header-alert-modal__dialog" (click)="$event.stopPropagation()">
    <h3 class="header-alert-modal__title" id="header-logout-title">Xác nhận đăng xuất</h3>
    <p class="header-alert-modal__message">Bạn có chắc muốn đăng xuất?</p>
    <div class="header-alert-modal__actions">
      <button type="button" class="header-alert-modal__btn header-alert-modal__btn--ghost" (click)="closeLogoutModal()">Đóng</button>
      <button type="button" class="header-alert-modal__btn header-alert-modal__btn--primary" (click)="confirmLogout()">Xác nhận</button>
    </div>
  </div>
</div>
