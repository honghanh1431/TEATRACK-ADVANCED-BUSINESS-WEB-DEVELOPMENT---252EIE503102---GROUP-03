<header class="shop-header">
  <div class="header-top">
    <div class="brand">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" aria-label="Về trang chủ">
        <img src="assets/images/logo ngo gia.png" alt="Hồng Trà Ngô Gia" class="logo" />
      </a>
    </div>

    <div class="actions">
      <a class="cart-link cart-link--guest-disabled" href="#" (click)="onCartClick($event)" aria-label="Giỏ hàng">
        <span class="icon-wrap">
          <img src="assets/icons/Cart.png" alt="Giỏ hàng">
          <span class="cart-badge" data-cart-count>0</span>
        </span>
        <div class="cart-meta">
          <span class="label">Giỏ hàng</span>
          <span id="headerCartCount" class="header-cart-count">0</span>
          <span id="headerCartTotal" class="header-cart-total">0đ</span>
        </div>
      </a>
      <a class="btn login-btn" routerLink="/login">Đăng nhập</a>
      <a class="btn signup-btn" routerLink="/register">Đăng ký</a>
    </div>
  </div>

  <nav class="nav-bar">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
      class="nav-item"
    >
      <img src="assets/icons/Home.png" alt=""> Trang chủ
    </a>
    <a routerLink="/aboutus" routerLinkActive="active">
      <img src="assets/icons/info.png" alt="">Về chúng tôi
    </a> 
    <a routerLink="/menu" routerLinkActive="active" [class.active]="isMenuOrProductActive" class="nav-item">
      <img src="assets/icons/menu.png" alt="">Menu thức uống
    </a>
    <a routerLink="/contact" routerLinkActive="active">
      <img src="assets/icons/lien_he.png" alt="">Liên hệ
    </a>
    <a routerLink="/blog" routerLinkActive="active">
      <img src="assets/icons/dien_dan.png" alt="">Diễn đàn
    </a>
    <a routerLink="/agency" routerLinkActive="active">
      <img src="assets/icons/chi_nhanh.png" alt="">Chi nhánh
    </a>
  </nav>
</header>

<div
  class="guest-login-prompt-modal"
  *ngIf="showLoginPromptModal"
  (click)="closeLoginPromptModal()"
  role="dialog"
  aria-modal="true"
  aria-labelledby="guest-prompt-title"
>
  <div class="guest-login-prompt-modal__dialog" (click)="$event.stopPropagation()">
    <h3 class="guest-login-prompt-modal__title" id="guest-prompt-title">Thông báo</h3>
    <p class="guest-login-prompt-modal__message">
      Mời bạn đăng nhập hoặc đăng ký để thưởng trọn hương vị dịch vụ và trải nghiệm tinh hoa trà Việt cùng Hồng Trà Ngô Gia.
    </p>
    <div class="guest-login-prompt-modal__actions">
      <button type="button" class="guest-login-prompt-modal__btn--primary" (click)="closeLoginPromptModal()">OK</button>
    </div>
  </div>
</div>
